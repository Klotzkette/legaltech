name: Build & Release

on:
  push:
    branches:
      - 'claude/release-*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (z.B. v1.0.0)'
        required: true
        default: 'v1.0.0'

permissions:
  contents: write

jobs:
  # Versionsname aus Branch oder workflow_dispatch-Input ableiten
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
    steps:
      - name: Determine version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            # Branch-Name: claude/release-v1.0.0-<suffix>  →  v1.0.0
            BRANCH="${{ github.ref_name }}"
            VERSION=$(echo "$BRANCH" | sed 's|claude/release-||' | cut -d'-' -f1)
            echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          fi

  # ─────────────────────────────────────────────────────────────
  # Windows EXE
  # ─────────────────────────────────────────────────────────────
  build-windows:
    needs: prepare
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build Windows EXE
        run: pyinstaller build.spec --noconfirm --clean

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: Word-Gliederungs-Retter-Windows
          path: dist/Word-Gliederungs-Retter.exe

  # ─────────────────────────────────────────────────────────────
  # macOS .app
  # ─────────────────────────────────────────────────────────────
  build-macos:
    needs: prepare
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Build macOS .app
        run: pyinstaller build_mac.spec --noconfirm --clean

      - name: Create ZIP of .app bundle
        run: |
          cd dist
          zip -r Word-Gliederungs-Retter-macOS.zip "Word-Gliederungs-Retter.app"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: Word-Gliederungs-Retter-macOS
          path: dist/Word-Gliederungs-Retter-macOS.zip

  # ─────────────────────────────────────────────────────────────
  # Create GitHub Release
  # ─────────────────────────────────────────────────────────────
  release:
    needs: [prepare, build-windows, build-macos]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: Word-Gliederungs-Retter-Windows
          path: artifacts/windows

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: Word-Gliederungs-Retter-macOS
          path: artifacts/macos

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.prepare.outputs.version }}
          name: "Word-Gliederungs-Retter ${{ needs.prepare.outputs.version }}"
          body: |
            ## Tom's Super Simple Word-Gliederungs-Retter ${{ needs.prepare.outputs.version }}

            Automatische Gliederungsstandardisierung für Word-Dokumente.
            Alle Überschriften werden auf **1. / 1.1 / 1.1.1 …** umgestellt.

            ### Downloads

            | Plattform | Datei |
            |-----------|-------|
            | Windows   | `Word-Gliederungs-Retter.exe` |
            | macOS     | `Word-Gliederungs-Retter-macOS.zip` (enthält .app) |

            ### Anleitung
            - **Windows:** `.exe` herunterladen und direkt starten (keine Installation nötig).
            - **macOS:** `.zip` entpacken, `.app` in den Programme-Ordner ziehen.

            Optional: OpenAI API-Key in den Einstellungen hinterlegen für KI-gestützte Erkennung.
          draft: false
          prerelease: false
          files: |
            artifacts/windows/Word-Gliederungs-Retter.exe
            artifacts/macos/Word-Gliederungs-Retter-macOS.zip
